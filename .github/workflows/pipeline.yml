name: Tech Sales DE Pipeline — Auto Refresh

on:
  push:
    branches: [main]
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  DQ_THRESHOLD: '0'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install flake8
      - run: flake8 pipeline/ --max-line-length=120 --ignore=E501,W503

  refresh-and-validate:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pandas numpy

      - name: Refresh data from DB
        run: |
          python3 << 'EOF'
          import pandas as pd
          import sqlite3
          import hashlib
          import os
          from datetime import datetime

          print(f"Run time: {datetime.utcnow().strftime('%Y-%m-%d %H:%M:%S UTC')}")

          DB = "data/tech_sales.db"
          TABLE = "tech_orders"

          if not os.path.exists(DB):
              print("No DB found — skipping refresh, using existing CSVs")
              exit(0)

          conn = sqlite3.connect(DB)
          df = pd.read_sql_query(f"SELECT * FROM {TABLE}", conn)
          conn.close()
          print(f"Bronze: {len(df)} rows fetched")
          df.to_csv("data/bronze.csv", index=False)

          # Silver transforms
          s = df.copy()
          s['quantity'] = pd.to_numeric(s['quantity'], errors='coerce').abs()
          s['unit_price'] = pd.to_numeric(s['unit_price'], errors='coerce')
          s['rating'] = pd.to_numeric(s['rating'], errors='coerce').clip(0, 5)
          for col in ['category', 'status', 'region']:
              if col in s.columns:
                  s[col] = s[col].fillna('').str.upper().str.strip()
          s = s.dropna(subset=['phone_number'])
          s = s.drop_duplicates()
          for col in ['customer_name', 'customer_email', 'phone_number']:
              if col in s.columns:
                  s[col] = s[col].apply(
                      lambda x: hashlib.sha256(str(x).encode()).hexdigest()
                      if pd.notna(x) and str(x) else x
                  )
          s.to_csv("data/transformed_data.csv", index=False)
          s.to_csv("data/gold_aggregated.csv", index=False)
          print(f"Silver/Gold: {len(s)} rows written")
          print("Refresh complete")
          EOF

      - name: Run DQ checks
        run: python3 pipeline/dq_checks.py data/transformed_data.csv

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/bronze.csv data/transformed_data.csv data/gold_aggregated.csv
          git diff --staged --quiet || git commit -m "chore: auto-refresh data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
