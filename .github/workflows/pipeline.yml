name: DE Pipeline Validation

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'

env:
  DQ_THRESHOLD: '0'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install flake8
      - run: flake8 pipeline/ --max-line-length=120 --ignore=E501,W503

  validate:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install pandas
      - name: Run DQ checks
        run: python3 pipeline/dq_checks.py data/transformed_data.csv
